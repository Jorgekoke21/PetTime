# Server Configuration
server.port=${SERVER_PORT:8081}

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:pettime}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:pettime}
spring.datasource.password=${DB_PASSWORD:pettime}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Secret (dev fallback only; override with env var in any non-local environment)
jwt.secret=${JWT_SECRET:cGV0dGltZS1kZXYtc2VjcmV0LWNoYW5nZS10aGlzLW5vdy0yMDI2}

# Logging
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
