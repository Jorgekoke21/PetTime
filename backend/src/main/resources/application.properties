# Server Configuration
server.port=8081

# Database Configuration (MySQL on port 3307)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/pettime?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=pettime
spring.datasource.password=pettime
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Secret (In production, use environment variable)
# Generar una key base64 segura (min 256 bit) para desarrollo
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Logging
logging.level.org.springframework.security=DEBUG
