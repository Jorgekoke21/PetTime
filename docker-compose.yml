services:
  mysql:
    image: mysql:8.4
    container_name: pettime-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pettime}
      MYSQL_USER: ${DB_USER:-pettime}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pettime}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pettime-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: ${SERVER_PORT:-8081}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-pettime}
      DB_USER: ${DB_USER:-pettime}
      DB_PASSWORD: ${DB_PASSWORD:-pettime}
      JWT_SECRET: ${JWT_SECRET:-cGV0dGltZS1kZXYtc2VjcmV0LWNoYW5nZS10aGlzLW5vdy0yMDI2}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      SECURITY_LOG_LEVEL: ${SECURITY_LOG_LEVEL:-INFO}
    ports:
      - "${SERVER_PORT:-8081}:8081"

volumes:
  mysql_data:
